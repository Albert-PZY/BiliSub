<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BiliAISub B站 AI 字幕工作台</title>
  <desc id="desc">展示扫码登录、视频解析、多语言字幕编辑和文件导出的 BiliAISub 工作台界面。</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="30" x2="1120" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102B4A"/>
      <stop offset="0.52" stop-color="#14243D"/>
      <stop offset="1" stop-color="#281A3D"/>
    </linearGradient>
    <linearGradient id="brand" x1="120" y1="102" x2="460" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5CCBFF"/>
      <stop offset="1" stop-color="#FF6EAC"/>
    </linearGradient>
    <linearGradient id="line" x1="130" y1="0" x2="840" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#52C7FF"/>
      <stop offset="1" stop-color="#F66BA7"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#06111F" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
