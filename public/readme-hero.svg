  <circle cx="142" cy="558" r="170" fill="#F162A4" fill-opacity="0.13" filter="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="618" rx="29" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="618" rx="29" stroke="#8ACBFF" stroke-opacity="0.2"/>

  <g opacity="0.92">
