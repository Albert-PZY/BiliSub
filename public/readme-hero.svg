    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#B3D7F6" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
